name: Sync data.json tu Firestore

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: sync-data
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cai firebase-admin
        working-directory: 92kamera
        run: npm install firebase-admin@12 --no-save

      - name: Generate data.json tu Firestore
        working-directory: 92kamera
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
        run: node scripts/export-data.cjs

      - name: Commit & push neu data.json thay doi
        working-directory: 92kamera
        run: |
          git config user.name "lummmmmn"
          git config user.email "136438690+lummmmmn@users.noreply.github.com"

          git add public/data.json

          if git diff --staged --quiet; then
            echo "data.json khong thay doi, bo qua commit."
            exit 0
          fi

          git commit -m "chore: sync data.json"
          git push
