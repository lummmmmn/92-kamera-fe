name: Sync data.json từ Firestore

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: sync-data
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cài firebase-admin
        working-directory: 92kamera
        run: npm install firebase-admin@12 --no-save

      - name: Generate data.json
        working-directory: 92kamera
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
        run: node scripts/export-data.cjs

      - name: Commit & push nếu data.json thay đổi
        working-directory: 92kamera
        run: |
          git config user.name "92k-sync-bot"
          git config user.email "sync-bot@92kamera.com"

          git add public/data.json

          if git diff --staged --quiet; then
            echo "data.json không thay đổi, bỏ qua commit."
            exit 0
          fi

          git commit -m "chore: sync data.json"
          git push
