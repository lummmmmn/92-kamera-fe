name: Sync data.json từ Firestore

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: sync-data
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cài firebase-admin
        # Code thật nằm trong thư mục con "92kamera", không phải gốc repo
        working-directory: 92kamera
        run: npm install firebase-admin@12 --no-save

      - name: Generate data.json
        # QUAN TRỌNG: scripts/sync-data.js và public/data.json nằm trong
        # thư mục con "92kamera/", không phải ở gốc repo. Thiếu working-directory
        # này là lý do workflow chạy "node scripts/sync-data.js" báo lỗi
        # "Cannot find module" vì tìm sai đường dẫn từ gốc repo.
        working-directory: 92kamera
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
        run: node scripts/sync-data.js

      - name: Commit & push nếu data.json thay đổi
        working-directory: 92kamera
        run: |
          git config user.name "92k-sync-bot"
          git config user.email "sync-bot@92kamera.com"
          git add public/data.json
          git diff --staged --quiet || git commit -m "chore: sync data.json [skip ci]"
          git push
